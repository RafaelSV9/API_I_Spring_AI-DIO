services:
  postgres:
    image: postgres:16-alpine
    container_name: api-inteligente-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: api_inteligente
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
